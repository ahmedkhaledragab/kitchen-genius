<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>غير متصل</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: "Cairo", system-ui, -apple-system, Segoe UI, sans-serif;
        background: #fafaf9;
        color: #18181b;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: #fff;
        border-radius: 28px;
        padding: 36px 24px;
        box-shadow: 0 20px 60px -20px rgba(0,0,0,.12);
      }
      .emoji { font-size: 56px; }
      h1 { font-size: 22px; margin: 12px 0 6px; }
      p { color: #71717a; font-size: 14px; line-height: 1.7; margin: 0 0 20px; }
      button {
        background: #16a34a;
        color: white;
        border: 0;
        padding: 12px 22px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0a; color: #fafafa; }
        .card { background: #18181b; }
        p { color: #a1a1aa; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">📡</div>
      <h1>مفيش اتصال بالإنترنت</h1>
      <p>تأكدي من اتصالك واضغطي على الزرار تحت علشان نحاول تاني.</p>
      <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>
